# Tox (http://tox.testrun.org/) is a tool for running tests
# in multiple virtualenvs. This configuration file will run the
# test suite on all supported python versions. To use it, "pip install tox"
# and then run "tox" from this directory.

[tox]
minversion = 3.15
envlist = pep8, pylint, mypy, bandit, pep257, py3{9,10,11,12,13,14,15}, readme, doc8, docs
skip_missing_interpreters = True

[testenv]
recreate = True
usedevelop = True
passenv =
  http_proxy
  HTTP_PROXY
  https_proxy
  HTTPS_PROXY
  no_proxy
  NO_PROXY
setev = PYTHONDONTWRITEBYTECODE=1
deps =
  sphinx
  -r{toxinidir}/pytest_requirements.txt
  pytest-html

commands =
  pip freeze
  pip install -e .
  py.test --cov=advanced_descriptors
  coverage report --fail-under 85

[testenv:py3{9,10,11,12,13,14,15}]
depends = pylint,mypy,pep8,ruff,ruff-format,refurb,pep257,bandit,isort

[testenv:venv]
commands = {posargs:}

[testenv:ruff]
skip_install = true
depends = isort
deps = ruff>=0.14.6
commands = ruff check .

[testenv:ruff-format]
skip_install = true
depends = isort
deps = ruff>=0.14.6
commands = ruff format --check .

[testenv:refurb]
skip_install = true
depends = isort
deps = refurb
commands = refurb logwrap

[testenv:pep8]
skip_install = true
depends = isort
deps =
  -r{toxinidir}/flake8_requirements.txt
commands = flake8 advanced_descriptors

[testenv:pep257]
skip_install = true
depends = isort
deps =
  pydocstyle[toml]
commands = pydocstyle -v advanced_descriptors

[testenv:doc8]
skip_install = true
deps =
  doc8
  Pygments
commands = doc8 README.rst doc/source

[testenv:install]
deps =
commands = pip install ./ -vvv -U

[testenv:pylint]
depends = pep8,ruff,pep257,bandit
deps =
  pylint>=3.0.0
commands =
  pylint advanced_descriptors

[testenv:docs]
depends = doc8,readme
deps =
  sphinx
commands = sphinx-build doc/source/ doc/build

[testenv:readme]
skip_install = true
deps =
  twine
  build
commands =
  python -m build -s
  twine check {toxinidir}/dist/*

[testenv:bandit]
depends = isort
deps = bandit
commands = bandit -r advanced_descriptors

[testenv:dep-graph]
deps =
  .
  pipdeptree
commands = pipdeptree

[testenv:mypy]
depends = pep8,ruff,pep257,bandit
deps =
  -r{toxinidir}/mypy_requirements.txt
commands =
  mypy --strict --show-error-codes -p advanced_descriptors

[testenv:isort]
skip_install = true
deps =
  isort
commands =
  isort advanced_descriptors

[flake8]
exclude =
  .venv,
  .git,
  .tox,
  dist,
  doc,
  *lib/python*,
  *egg,
  build,
  __init__.py,
  _version.py,
  docs
ignore =
  E203,
# whitespace before ':'
  W503,
# line break before binary operator
  D401,
# First line should be in imperative mood; try rephrasing
  D202,
# No blank lines allowed after function docstring
  D203,
# 1 blank line required before class docstring
  D213
# Multi-line docstring summary should start at the second line
show-pep8 = True
show-source = True
count = True
max-line-length = 120
